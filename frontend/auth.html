<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google Login OAuth -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<title>Insurance Auth Portal</title>

<style>
body{
    margin:0;
    font-family: Poppins, sans-serif;
    background: linear-gradient(135deg,#7AC2FF,#C79BFF,#FFB5C5);
    background-size:300% 300%;
    animation: bg 8s infinite alternate;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
@keyframes bg{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

.container{
    width:850px;
    max-width:90%;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    color:#333;
    display:flex;
    box-shadow:0 0 25px rgba(0,0,0,0.2);
}

.left,.right{
    flex:1;
    padding:20px;
}

h2{text-align:center;margin-bottom:20px;}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    background:rgba(255,255,255,0.5);
    border:none;
    border-radius:8px;
    font-size:14px;
}
input:focus{outline:2px solid #6C5CE7;}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:15px;
    background:#6C5CE7;
    color:#fff;
    cursor:pointer;
    transition:.3s;
}
button:hover{background:#4834D4;}

.toggle{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
    color:#2C3A47;
}
.toggle:hover{color:#000;}

.password-box{
    position:relative;
}
.eye{
    position:absolute;
    right:12px;
    top:14px;
    cursor:pointer;
}

.google-btn{
    background:#fff;
    color:#555;
    border:1px solid #ddd;
    margin-top:10px;
}
.google-btn:hover{background:#f3f3f3;}

.forgot{text-align:right;margin:5px 0;font-size:13px;color:#0652DD;cursor:pointer;}
.forgot:hover{text-decoration:underline;}

.hidden{display:none;}

/* ADDED: status messages for reset flow only — nothing else changed */
.reset-msg{
    padding:9px 12px;
    border-radius:8px;
    font-size:13px;
    font-weight:500;
    margin-top:8px;
    display:none;
}
.reset-msg.success{background:#DCFCE7;color:#15803D;}
.reset-msg.error  {background:#FEE2E2;color:#991B1B;}
</style>
</head>
<body>

<div class="container">

<!-- LOGIN PANEL — UNCHANGED -->
<div class="left" id="loginBox">
    <h2>Login</h2>

    <input type="text" id="loginUser" placeholder=" Enter yourEmail">

    <div class="password-box">
        <input type="password" id="loginPass" placeholder="Enter your Password">
        <span class="eye" onclick="toggle('loginPass')">👁</span>
    </div>

    <!-- Google reCAPTCHA -->
    <div class="g-recaptcha" data-sitekey="6LdxN8orAAAAAK_nUskDJoJbpyP3U2F23QqPh0Z-"></div>

    <button onclick="login()">Login</button>

    <p style="text-align:center;margin-top:10px;font-weight:bold;color:#444;">OR</p>

    <!-- Google Sign-In Button UI Holder -->
    <div id="googleBtn" style="text-align:center;margin-top:10px;"></div>

    <div class="forgot" onclick="showReset()">Forgot Password?</div>
    <div class="toggle" onclick="showSignup()">Don't have an account? Sign up</div>
</div>

<!-- SIGNUP PANEL — UNCHANGED -->
<div class="right hidden" id="signupBox">
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">

    <div class="password-box">
        <input type="password" id="pass1" placeholder="Create Password">
        <span class="eye" onclick="toggle('pass1')">👁</span>
    </div>

    <div class="password-box">
        <input type="password" id="pass2" placeholder="Confirm Password">
        <span class="eye" onclick="toggle('pass2')">👁</span>
    </div>

    <button onclick="signup()">Sign Up</button>
    <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
</div>

<!-- RESET BOX — ONLY THIS SECTION UPDATED -->
<div class="right hidden" id="resetBox">
    <h2>Reset Password</h2>

    <!-- Step 1: Enter Email -->
    <div id="resetStep1">
        <input type="email" id="resetEmail" placeholder="Enter your Email">
        <button id="sendOtpBtn" onclick="sendReset()">Send OTP</button>
        <div id="resetMsg" class="reset-msg"></div>
    </div>

    <!-- Step 2: OTP + New Password (hidden until OTP sent) -->
    <div id="otpSection" class="hidden" style="margin-top:15px;">
        <p style="font-size:13px;color:#444;margin-bottom:6px;">✉ OTP sent! Check your email.</p>

        <input type="text" id="otp" placeholder="Enter OTP" maxlength="6">

        <div class="password-box">
            <input type="password" id="newPass" placeholder="New Password">
            <span class="eye" onclick="toggle('newPass')">👁</span>
        </div>

        <!-- ADDED: confirm password -->
        <div class="password-box">
            <input type="password" id="confirmNewPass" placeholder="Confirm New Password">
            <span class="eye" onclick="toggle('confirmNewPass')">👁</span>
        </div>

        <button id="resetBtn" onclick="confirmReset()">Reset Password</button>
        <div id="otpMsg" class="reset-msg"></div>
    </div>

    <div class="toggle" onclick="showLogin()">Back to Login</div>
</div>

<script>

/* ================= TOGGLE PASSWORD ================= */
function toggle(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

/* ================= SWITCH TO SIGNUP ================= */
function showSignup(){

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("signupBox").style.display = "block";
    document.getElementById("resetBox").style.display = "none";

}

/* ================= SWITCH TO LOGIN ================= */
function showLogin(){

    document.getElementById("signupBox").style.display = "none";
    document.getElementById("resetBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";

}

/* ================= SHOW RESET — ADDED (was missing, caused ReferenceError) ================= */
function showReset(){

    document.getElementById("loginBox").style.display  = "none";
    document.getElementById("signupBox").style.display = "none";
    document.getElementById("resetBox").style.display  = "block";

    // Always start from step 1 and clear previous values
    document.getElementById("resetStep1").classList.remove("hidden");
    document.getElementById("otpSection").classList.add("hidden");
    document.getElementById("resetEmail").value         = "";
    document.getElementById("otp").value                = "";
    document.getElementById("newPass").value            = "";
    document.getElementById("confirmNewPass").value     = "";
    document.getElementById("resetMsg").style.display  = "none";
    document.getElementById("otpMsg").style.display    = "none";

}

/* ================= LOGIN — UNCHANGED ================= */
async function login(){

    const identifier = document.getElementById("loginUser").value.trim();
    const password = document.getElementById("loginPass").value;

    if(!identifier || !password){
        alert("Enter email/username and password");
        return;
    }

    try{

        const formData = new URLSearchParams();
        formData.append("username", identifier);
        formData.append("password", password);

        const res = await fetch("http://127.0.0.1:8000/api/auth/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },

            body: formData

        });

        const data = await res.json();

        console.log("Login response:", data);

        //Check backend error first
        if(!res.ok){

            alert("❌ " + (data.detail || data.message || "Login failed"));
            return;

        }

        //  Ensure token exists
        if(!data.access_token){

            alert("❌ Login failed: No token received");
            return;

        }

        // Save token
        localStorage.setItem("token", data.access_token);

        // optional debug info
        console.log("Token saved successfully");

        // Redirect to dashboard (role handled there)
        window.location.href = "/frontend/dashboard.html";

    }
    catch(error){

        console.error("Login error:", error);

        alert("❌ Cannot connect to server");

    }

}

/* ================= SIGNUP — UNCHANGED ================= */
async function signup(){

    const fullname = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("pass1").value;
    const confirmPassword = document.getElementById("pass2").value;

    // validation
    if(!fullname || !email || !password || !confirmPassword){
        alert("Please fill all fields");
        return;
    }

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    try{

        // send exactly what backend expects
        const payload = {
            username: email,      // backend needs username
            email: email,
            fullname: fullname,
            password: password
        };

        const res = await fetch("http://127.0.0.1:8000/api/auth/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        console.log("Signup response:", data);

        if(res.ok){

            // safe alert
            alert(
                "✅ " + (data.message || "User created successfully") +
                "\nRole: " + (data.assigned_role || "user")
            );

            showLogin();

        }else{

            alert(
                "❌ " + (
                    data.detail ||
                    data.message ||
                    "Signup failed"
                )
            );

        }

    }
    catch(err){

        console.error(err);

        alert("❌ Cannot connect to server");

    }
}

/* ================= SEND OTP — UPDATED ================= */
async function sendReset(){

    const email = document.getElementById("resetEmail").value.trim();
    const btn   = document.getElementById("sendOtpBtn");
    const msg   = document.getElementById("resetMsg");

    msg.style.display = "none";

    if(!email){
        msg.className     = "reset-msg error";
        msg.textContent   = "❌ Please enter your email.";
        msg.style.display = "block";
        return;
    }

    btn.disabled    = true;
    btn.textContent = "Sending…";

    try{

        const res = await fetch("http://127.0.0.1:8000/api/auth/forgot-password",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if(res.ok){

            msg.className     = "reset-msg success";
            msg.textContent   = "✅ " + (data.message || "OTP sent! Check your email.");
            msg.style.display = "block";

            // Show step 2, hide step 1
            document.getElementById("otpSection").classList.remove("hidden");
            document.getElementById("resetStep1").classList.add("hidden");

        }else{

            msg.className     = "reset-msg error";
            msg.textContent   = "❌ " + (data.detail || data.message || "Failed to send OTP");
            msg.style.display = "block";

        }

    }catch(e){

        msg.className     = "reset-msg error";
        msg.textContent   = "❌ Cannot connect to server.";
        msg.style.display = "block";

    }finally{

        btn.disabled    = false;
        btn.textContent = "Send OTP";

    }

}
/* ================= CONFIRM RESET — UPDATED ================= */
async function confirmReset(){

    const email    = document.getElementById("resetEmail").value.trim();
    const otp      = document.getElementById("otp").value.trim();
    const newPass  = document.getElementById("newPass").value;
    const confPass = document.getElementById("confirmNewPass").value;
    const btn      = document.getElementById("resetBtn");
    const msg      = document.getElementById("otpMsg");

    msg.style.display = "none";

    if(!otp || !newPass || !confPass){
        msg.className     = "reset-msg error";
        msg.textContent   = "Fill in OTP and both password fields.";
        msg.style.display = "block";
        return;
    }

    if(newPass !== confPass){
        msg.className     = "reset-msg error";
        msg.textContent   = " Passwords do not match.";
        msg.style.display = "block";
        return;
    }

    btn.disabled    = true;
    btn.textContent = "Resetting…";

    try{

        const res = await fetch("http://127.0.0.1:8000/api/auth/reset-password",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ email, otp, new_password: newPass })
        });

        const data = await res.json();

        if(res.ok){

            msg.className     = "reset-msg success";
            msg.textContent   = " Password reset! Redirecting to login…";
            msg.style.display = "block";

            setTimeout(() => showLogin(), 1500);

        }else{

            msg.className     = "reset-msg error";
            msg.textContent   = "❌ " + (data.detail || data.message || "Reset failed. Check your OTP.");
            msg.style.display = "block";

        }

    }catch(e){

        msg.className     = "reset-msg error";
        msg.textContent   = " Cannot connect to server.";
        msg.style.display = "block";

    }finally{

        btn.disabled    = false;
        btn.textContent = "Reset Password";

    }

}
/* ================= GOOGLE LOGIN — UNCHANGED ================= */
async function handleGoogleLogin(response){

    // Step 1: Validate Google response
    if(!response || !response.credential){

        alert("Google authentication failed");
        return;

    }

    try{

        // Step 2: Send token to backend
        const res = await fetch("http://127.0.0.1:8000/api/auth/google-login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                token: response.credential
            })

        });

        // Step 3: Parse safely
        let data = null;
        try{
            data = await res.json();
        }
        catch(parseError){

            console.error("JSON parse error:", parseError);
            alert("Invalid server response");
            return;

        }
        console.log("Google login response:", data);

        // Step 4: Handle HTTP errors
        if(!res.ok){

            alert(data.detail || data.message || "Google login failed");
            return;

        }

        // Step 5: Validate token
        if(!data.access_token){

            alert("Login failed: token missing");
            return;

        }

        // Step 6: Save token
        localStorage.setItem("token", data.access_token);

        console.log("Token saved:", data.access_token);

        // Step 7: Redirect
        window.location.href = "/frontend/dashboard.html";

    }
    catch(error){

        console.error("Google login error:", error);

        alert("Cannot connect to backend server");

    }

}
/* ================= LOAD GOOGLE SSO — UNCHANGED ================= */
async function loadGoogleSSO(){

    try{

        const res = await fetch("http://127.0.0.1:8000/api/auth/google-client");

        if(!res){
            console.error("Fetch failed");
            return;
        }

        if(!res.ok){
            console.error("Google client fetch failed:", res.status);
            return;
        }

        const data = await res.json();

        if(!data || !data.client_id){
            console.error("Google client ID missing");
            return;
        }

        console.log("Google Client ID:", data.client_id);

        google.accounts.id.initialize({

            client_id: data.client_id,

            callback: handleGoogleLogin,

            auto_select: false,

            cancel_on_tap_outside: true

        });

        google.accounts.id.renderButton(

            document.getElementById("googleBtn"),

            {
                theme:"outline",
                size:"large",
                width:300
            }

        );
    }
    catch(error){

        console.error("Google SSO load error:", error);
    }
}

/* ================= INITIALIZE ================= */
window.addEventListener("load", async () => {

    try {

        const token = localStorage.getItem("token");

        // No token — just show login form
        if(!token){
            loadGoogleSSO();
            return;
        }

        // Token exists — verify it with backend BEFORE redirecting
        // This fixes: auth page directly opening dashboard without credentials
        try{

            const res = await fetch("http://127.0.0.1:8000/api/auth/me", {
                headers: { Authorization: "Bearer " + token }
            });

            if(res.ok){
                // Token is valid → go to dashboard
                window.location.href = "/frontend/dashboard.html";
            } else {
                // Token expired or invalid → clear it and show login
                localStorage.removeItem("token");
                loadGoogleSSO();
            }

        } catch(e){
            // Server unreachable → clear token and show login
            localStorage.removeItem("token");
            loadGoogleSSO();
        }

    }
    catch(err){
        console.error("Startup error:", err);
    }

});

</script>
</body>
</html>
