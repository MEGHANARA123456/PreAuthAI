<!DOCTYPE html>
<html>
<head><title>PDF Viewer</title>
<style>
body{margin:0;background:#e8f3ff;font-family:Poppins;display:flex;justify-content:center;}
.viewer{
 width:80vw;height:90vh;background:white;margin-top:30px;
 box-shadow:0 0 25px rgba(0,0,0,.2);border-radius:12px;overflow:hidden;
}
iframe{width:100%;height:100%;border:none;}
</style></head>

<body>
<div class="viewer"><iframe id="pdf"></iframe></div>
<script>
const API="http://127.0.0.1:8000/api";
let id=new URLSearchParams(location.search).get("id");
document.getElementById("pdf").src=`${API}/pa/${id}/download`;
</script>

</body>
</html>
