<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PA Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Poppins, system-ui, sans-serif; background: #E8F3FF; min-height: 100vh; }
.toolbar { background: #0F3C88; color: white; padding: 14px 30px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.2); }
.toolbar .title { flex: 1; font-size: 17px; font-weight: 600; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s, transform .1s; text-decoration: none; }
.btn:hover { opacity: .88; transform: translateY(-1px); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-outline { background: rgba(255,255,255,.12); color: white; border: 1px solid rgba(255,255,255,.3); }
.btn-primary { background: #0F3C88; color: white; }
.btn-white { background: white; color: #0F3C88; }
.btn-green { background: #16A34A; color: white; }
.btn-red { background: #DC2626; color: white; }
.page { max-width: 1080px; margin: 0 auto; padding: 28px 20px; }
.message-bar { margin-bottom: 18px; padding: 14px 18px; border-radius: 12px; display: none; font-size: 13px; line-height: 1.5; }
.message-bar.show { display: block; }
.message-bar.success { background: #DCFCE7; color: #166534; }
.message-bar.warning { background: #FEF3C7; color: #92400E; }
.message-bar.error { background: #FEE2E2; color: #991B1B; }
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
.sum-card { background: white; border-radius: 10px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,.07); text-align: center; }
.sum-card .num { font-size: 28px; font-weight: 700; color: #0F3C88; }
.sum-card .lbl { font-size: 12px; color: #64748B; margin-top: 2px; }
.sum-card.green .num { color: #16A34A; }
.sum-card.yellow .num { color: #CA8A04; }
.sum-card.red .num { color: #DC2626; }
.controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.search-box, .filter-select { padding: 9px 14px; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 14px; font-family: inherit; background: white; }
.filter-select { cursor: pointer; }
.table-card { background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.08); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { background: #0F3C88; color: white; padding: 13px 16px; text-align: left; font-weight: 600; font-size: 13px; }
tbody tr { border-bottom: 1px solid #F1F5F9; transition: background .15s; }
tbody tr:hover { background: #F8FAFC; }
tbody td { padding: 13px 16px; color: #334155; vertical-align: middle; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .4px; }
.badge-DRAFT { background: #FEF9C3; color: #854D0E; }
.badge-APPROVED { background: #DCFCE7; color: #15803D; }
.badge-REJECTED { background: #FEE2E2; color: #991B1B; }
.badge-PENDING { background: #E0F2FE; color: #0369A1; }
.action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
.state { padding: 60px 20px; text-align: center; color: #64748B; }
.state .icon { font-size: 48px; margin-bottom: 12px; }
.state h3 { font-size: 18px; font-weight: 600; color: #334155; margin-bottom: 6px; }
.state p { font-size: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid #E2E8F0; border-top-color: #0F3C88; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.detail-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,.08); margin-bottom: 24px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 18px; }
.detail-row { display: grid; gap: 8px; }
.detail-row .label { color: #64748B; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
.detail-row .value { color: #111827; font-size: 14px; line-height: 1.6; }  .hidden { display: none !important; }@media (max-width: 740px) { .detail-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="toolbar">
  <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">← Dashboard</button>
  <div class="title">📊 PA Status</div>
  <button class="btn btn-white" onclick="window.location.href='pa_form.html'">➕ New PA Request</button>
  <button class="btn btn-outline" onclick="logout()">Logout</button>
</div>

<div class="page">
  <div id="messageBar" class="message-bar"></div>
  <div id="listSection">
    <div class="summary">
      <div class="sum-card"><div class="num" id="totalCount">—</div><div class="lbl">Total Forms</div></div>
      <div class="sum-card yellow"><div class="num" id="draftCount">—</div><div class="lbl">Draft</div></div>
      <div class="sum-card green"><div class="num" id="approvedCount">—</div><div class="lbl">Approved</div></div>
      <div class="sum-card red"><div class="num" id="rejectedCount">—</div><div class="lbl">Rejected</div></div>
    </div>

    <div class="controls">
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <input id="searchBox" class="search-box" placeholder="🔍 Search medication, diagnosis or user…" oninput="renderTable()">
        <select id="statusFilter" class="filter-select" onchange="renderTable()">
          <option value="">All Statuses</option>
          <option value="DRAFT">Draft</option>
          <option value="APPROVED">Approved</option>
          <option value="REJECTED">Rejected</option>
        </select>
      </div>
      <button class="btn btn-outline btn-primary" onclick="loadList()">🔄 Refresh</button>
    </div>

    <div id="tableCard" class="table-card">
      <div id="tableBody">
        <div class="state">
          <div class="spinner"></div>
          <h3>Loading PA statuses…</h3>
        </div>
      </div>
    </div>
  </div>

  <div id="detailSection" class="hidden"></div>
</div>

<script>
const API = "http://127.0.0.1:8001";
const token = localStorage.getItem("token");
const params = new URLSearchParams(window.location.search);
const paId = params.get("id");
let currentRole = "user";
let allForms = [];
let currentPage = 1;
const PER_PAGE = 10;

if (!token) window.location.href = "auth.html";

function showMessage(type, message) {
  const bar = document.getElementById("messageBar");
  if (!message) { bar.className = "message-bar"; bar.textContent = ""; return; }
  bar.className = `message-bar show ${type}`;
  bar.textContent = message;
}
function showError(msg) { showMessage("error", msg); }
function showSuccess(msg) { showMessage("success", msg); }
function showWarning(msg) { showMessage("warning", msg); }

function logout() {
  localStorage.clear();
  window.location.href = "auth.html";
}

async function init() {
  try {
    const res = await fetch(`${API}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { localStorage.removeItem("token"); window.location.href = "auth.html"; return; }
    const user = await res.json();
    currentRole = user.role || "user";

    if (paId) {
      document.getElementById("listSection").classList.add("hidden");
      await loadDetail(paId);
    } else {
      await loadList();
    }
  } catch (err) {
    showError("Unable to determine user role. Please log in again.");
    console.error(err);
  }
}

async function loadList() {
  showMessage("", "");
  document.getElementById("detailSection").classList.add("hidden");
  document.getElementById("listSection").classList.remove("hidden");
  document.getElementById("tableBody").innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <h3>Loading PA statuses…</h3>
    </div>`;

  try {
    const endpoint = (currentRole === "admin" || currentRole === "manager") ? `${API}/api/pa/all` : `${API}/api/pa/list`;
    const res = await fetch(endpoint, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { localStorage.removeItem("token"); window.location.href = "auth.html"; return; }
    if (!res.ok) throw new Error(`Failed to load PA forms (${res.status})`);

    allForms = await res.json();
    currentPage = 1;
    updateSummary();
    renderTable();
  } catch (err) {
    document.getElementById("tableBody").innerHTML = `
      <div class="state">
        <div class="icon">⚠️</div>
        <h3>Unable to load PA forms</h3>
        <p>${err.message}</p>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="loadList()">Retry</button>
      </div>`;
    showError(err.message);
  }
}

function updateSummary() {
  document.getElementById("totalCount").textContent = allForms.length;
  document.getElementById("draftCount").textContent = allForms.filter(f => f.status === "DRAFT").length;
  document.getElementById("approvedCount").textContent = allForms.filter(f => f.status === "APPROVED").length;
  document.getElementById("rejectedCount").textContent = allForms.filter(f => f.status === "REJECTED").length;
}

function renderTable() {
  const search = document.getElementById("searchBox").value.toLowerCase();
  const filter = document.getElementById("statusFilter").value;

  const filtered = allForms.filter(f => {
    const query = `${f.medication || ""} ${f.diagnosis || ""} ${f.created_by || ""}`.toLowerCase();
    const matchSearch = !search || query.includes(search);
    const matchStatus = !filter || f.status === filter;
    return matchSearch && matchStatus;
  });

  if (!filtered.length) {
    document.getElementById("tableBody").innerHTML = `
      <div class="state">
        <div class="icon">📭</div>
        <h3>No forms found</h3>
        <p>No PA forms match your current search or status filter.</p>
      </div>`;
    return;
  }

  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const pageData = filtered.slice(start, start + PER_PAGE);

  let html = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Medication</th>
          <th>Diagnosis</th>
          ${currentRole === "admin" || currentRole === "manager" ? '<th>User</th>' : ''}
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>`;

  pageData.forEach((f, idx) => {
    const num = start + idx + 1;
    const status = (f.status || "DRAFT").toUpperCase();
    const created = f.created_at ? new Date(f.created_at).toLocaleDateString() : "—";
    const userCell = currentRole === "admin" || currentRole === "manager" ? `<td>${f.created_by || "—"}</td>` : "";
    const pdfBtn = status === "APPROVED" ? `<button class="btn btn-green btn-sm" onclick="viewPDF('${f._id}')">📄 PDF</button>` : "";

    html += `
      <tr>
        <td style="color:#94A3B8;font-size:12px;">${num}</td>
        <td><strong>${f.medication || f.procedure || "—"}</strong></td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(f.diagnosis||"").replace(/"/g, '&#34;')}">${f.diagnosis || "—"}</td>
        ${userCell}
        <td><span class="badge badge-${status}">${status}</span></td>
        <td style="font-size:13px;color:#64748B;">${created}</td>
        <td><div class="action-btns"><button class="btn btn-primary btn-sm" onclick="viewStatus('${f._id}')">👁 View</button>${pdfBtn}</div></td>
      </tr>`;
  });

  html += `</tbody></table>`;

  if (totalPages > 1) {
    html += `<div class="pagination"><button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>‹ Prev</button>`;
    for (let p = 1; p <= totalPages; p++) {
      html += `<button class="page-btn ${p === currentPage ? "active" : ""}" onclick="changePage(${p})">${p}</button>`;
    }
    html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next ›</button></div>`;
  }

  document.getElementById("tableBody").innerHTML = html;
}

function changePage(page) {
  currentPage = page;
  renderTable();
}

function viewStatus(id) {
  window.location.href = `pa_status.html?id=${id}`;
}

function viewPDF(id) {
  window.location.href = `pdf_viewer.html?id=${id}`;
}

async function loadDetail(id) {
  document.getElementById("detailSection").className = "detail-card";
  document.getElementById("detailSection").innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <h3>Loading PA details…</h3>
    </div>`;
  document.getElementById("listSection").classList.add("hidden");
  document.getElementById("detailSection").classList.remove("hidden");

  try {
    const res = await fetch(`${API}/api/pa/${id}`, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { localStorage.removeItem("token"); window.location.href = "auth.html"; return; }
    if (!res.ok) {
      const error = await res.json().catch(() => ({}));
      throw new Error(error.detail || `Unable to fetch PA (${res.status})`);
    }
    const data = await res.json();
    renderDetail(data);
  } catch (err) {
    document.getElementById("detailSection").innerHTML = `
      <div class="state">
        <div class="icon">⚠️</div>
        <h3>Unable to load PA details</h3>
        <p>${err.message}</p>
        <button class="btn btn-primary" onclick="window.location.href='pa_status.html'">Back to Status List</button>
      </div>`;
    showError(err.message);
  }
}

function renderDetail(data) {
  const status = (data.status || "DRAFT").toUpperCase();
  const approvedAt = data.reviewed_at ? new Date(data.reviewed_at).toLocaleString() : "—";
  const createdAt = data.created_at ? new Date(data.created_at).toLocaleString() : "—";
  const pdfButton = status === "APPROVED" ? `<button class="btn btn-green" onclick="viewPDF('${data._id}')">📄 Download Approved PDF</button>` : "";
  const reviewer = data.reviewer || "—";

  document.getElementById("detailSection").innerHTML = `
    <div class="detail-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;">
        <div>
          <div style="font-size:13px;color:#64748B;margin-bottom:4px;">PA ID</div>
          <div style="font-size:18px;font-weight:700;">${data._id}</div>
        </div>
        <div><span class="badge badge-${status}">${status}</span></div>
      </div>
      <div class="detail-grid">
        <div class="detail-row"><div class="label">Medication / Procedure</div><div class="value">${data.medication || data.procedure || "—"}</div></div>
        <div class="detail-row"><div class="label">Diagnosis</div><div class="value">${data.diagnosis || "—"}</div></div>
        <div class="detail-row"><div class="label">Created By</div><div class="value">${data.created_by || "—"}</div></div>
        <div class="detail-row"><div class="label">Created At</div><div class="value">${createdAt}</div></div>
        <div class="detail-row"><div class="label">Reviewer</div><div class="value">${reviewer}</div></div>
        <div class="detail-row"><div class="label">Reviewed At</div><div class="value">${approvedAt}</div></div>
      </div>
      <div class="detail-row" style="margin-top:20px;"><div class="label">Medical Necessity / History</div><div class="value">${data.history || data.medical_necessity || "—"}</div></div>
      <div class="detail-grid" style="margin-top:20px;">
        <div class="detail-row"><div class="label">Strength / Route</div><div class="value">${data.strength || "—"}</div></div>
        <div class="detail-row"><div class="label">Frequency</div><div class="value">${data.frequency || "—"}</div></div>
        <div class="detail-row"><div class="label">Quantity</div><div class="value">${data.quantity || "—"}</div></div>
        <div class="detail-row"><div class="label">Start Date</div><div class="value">${data.start_date || "—"}</div></div>
      </div>
      <div class="detail-grid" style="margin-top:20px;">
        <div class="detail-row"><div class="label">Allergies</div><div class="value">${data.allergies || "—"}</div></div>
        <div class="detail-row"><div class="label">Urgency</div><div class="value">${data.urgency || "Standard"}</div></div>
        <div class="detail-row"><div class="label">Reason(s)</div><div class="value">${data.reasons || "—"}</div></div>
        <div class="detail-row"><div class="label">Reviewer Comments</div><div class="value">${data.comments || "—"}</div></div>
      </div>
      <div style="margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-outline" onclick="window.location.href='pa_status.html'">← Back to Status List</button>
        ${pdfButton}
      </div>
    </div>`;
}

init();
</script>
</body>
</html>
