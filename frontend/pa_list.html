<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>My PA Forms</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Poppins, system-ui, sans-serif;
  background: #E8F3FF;
  min-height: 100vh;
}

/* ── Toolbar ── */
.toolbar {
  background: #0F3C88;
  color: white;
  padding: 14px 30px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
}
.toolbar .title { flex: 1; font-size: 17px; font-weight: 600; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .2s, transform .1s;
  text-decoration: none;
}
.btn:hover { opacity: .88; transform: translateY(-1px); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.btn-outline { background: rgba(255,255,255,.12); color: white; border: 1px solid rgba(255,255,255,.3); }
.btn-primary { background: #0F3C88; color: white; }
.btn-white   { background: white; color: #0F3C88; }
.btn-green   { background: #16A34A; color: white; }
.btn-red     { background: #DC2626; color: white; }

/* ── Page ── */
.page { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

/* ── Summary cards ── */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.sum-card {
  background: white;
  border-radius: 10px;
  padding: 16px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  text-align: center;
}
.sum-card .num  { font-size: 28px; font-weight: 700; color: #0F3C88; }
.sum-card .lbl  { font-size: 12px; color: #64748B; margin-top: 2px; }
.sum-card.green .num { color: #16A34A; }
.sum-card.yellow .num{ color: #CA8A04; }
.sum-card.red   .num { color: #DC2626; }

/* ── Controls ── */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}
.search-box {
  padding: 9px 14px;
  border: 1px solid #CBD5E1;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  width: 260px;
  background: white;
}
.search-box:focus { outline: none; border-color: #0F3C88; }

.filter-select {
  padding: 9px 14px;
  border: 1px solid #CBD5E1;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  background: white;
  cursor: pointer;
}

/* ── Table card ── */
.table-card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead th {
  background: #0F3C88;
  color: white;
  padding: 13px 16px;
  text-align: left;
  font-weight: 600;
  font-size: 13px;
}
tbody tr {
  border-bottom: 1px solid #F1F5F9;
  transition: background .15s;
}
tbody tr:hover { background: #F8FAFC; }
tbody td { padding: 13px 16px; color: #334155; vertical-align: middle; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .4px;
}
.badge-DRAFT    { background: #FEF9C3; color: #854D0E; }
.badge-APPROVED { background: #DCFCE7; color: #15803D; }
.badge-REJECTED { background: #FEE2E2; color: #991B1B; }
.badge-PENDING  { background: #E0F2FE; color: #0369A1; }

.action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

/* ── Empty / loading states ── */
.state {
  padding: 60px 20px;
  text-align: center;
  color: #64748B;
}
.state .icon { font-size: 48px; margin-bottom: 12px; }
.state h3    { font-size: 18px; font-weight: 600; color: #334155; margin-bottom: 6px; }
.state p     { font-size: 14px; }

.spinner {
  width: 36px; height: 36px;
  border: 3px solid #E2E8F0;
  border-top-color: #0F3C88;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Pagination ── */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 16px;
  border-top: 1px solid #F1F5F9;
}
.page-btn {
  padding: 6px 12px;
  border: 1px solid #CBD5E1;
  border-radius: 6px;
  background: white;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: .15s;
}
.page-btn:hover { background: #E8F0FF; border-color: #0F3C88; }
.page-btn.active { background: #0F3C88; color: white; border-color: #0F3C88; }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">← Dashboard</button>
  <div class="title">📋 My PA Forms</div>
  <button class="btn btn-white" onclick="window.location.href='pa_form.html'">➕ New PA Request</button>
  <button class="btn btn-outline" onclick="logout()">Logout</button>
</div>

<div class="page">

  <!-- Summary -->
  <div class="summary">
    <div class="sum-card"><div class="num" id="totalCount">—</div><div class="lbl">Total Forms</div></div>
    <div class="sum-card yellow"><div class="num" id="draftCount">—</div><div class="lbl">Draft / Pending</div></div>
    <div class="sum-card green"><div class="num" id="approvedCount">—</div><div class="lbl">Approved</div></div>
    <div class="sum-card red"><div class="num" id="rejectedCount">—</div><div class="lbl">Rejected</div></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <input class="search-box" id="searchBox" placeholder="🔍 Search medication or diagnosis…" oninput="renderTable()">
      <select class="filter-select" id="statusFilter" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option value="DRAFT">Draft</option>
        <option value="APPROVED">Approved</option>
        <option value="REJECTED">Rejected</option>
      </select>
    </div>
    <button class="btn btn-outline btn-primary" onclick="loadForms()">🔄 Refresh</button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div id="tableBody">
      <div class="state">
        <div class="spinner"></div>
        <h3>Loading your PA forms…</h3>
      </div>
    </div>
  </div>

</div>

<script>
const API    = "http://127.0.0.1:8000";
const token  = localStorage.getItem("token");
let   allForms = [];
let   currentPage = 1;
const PER_PAGE    = 10;

if (!token) window.location.href = "auth.html";

// ── Load all forms ──────────────────────────────────────────────
async function loadForms() {
  document.getElementById("tableBody").innerHTML = `
    <div class="state">
      <div class="spinner"></div>
      <h3>Loading your PA forms…</h3>
    </div>`;

  try {
    const res = await fetch(`${API}/api/pa/list`, {
      headers: { "Authorization": "Bearer " + token }
    });

    if (res.status === 401) { window.location.href = "auth.html"; return; }
    if (!res.ok) throw new Error("Failed to load forms");

    allForms = await res.json();
    updateSummary();
    currentPage = 1;
    renderTable();

  } catch (err) {
    document.getElementById("tableBody").innerHTML = `
      <div class="state">
        <div class="icon">⚠️</div>
        <h3>Failed to Load Forms</h3>
        <p>${err.message}</p>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="loadForms()">Retry</button>
      </div>`;
  }
}

// ── Summary counts ──────────────────────────────────────────────
function updateSummary() {
  document.getElementById("totalCount").textContent    = allForms.length;
  document.getElementById("draftCount").textContent    = allForms.filter(f => f.status === "DRAFT").length;
  document.getElementById("approvedCount").textContent = allForms.filter(f => f.status === "APPROVED").length;
  document.getElementById("rejectedCount").textContent = allForms.filter(f => f.status === "REJECTED").length;
}

// ── Render table ────────────────────────────────────────────────
function renderTable() {
  const search = document.getElementById("searchBox").value.toLowerCase();
  const filter = document.getElementById("statusFilter").value;

  let filtered = allForms.filter(f => {
    const matchSearch = !search ||
      (f.medication || "").toLowerCase().includes(search) ||
      (f.diagnosis  || "").toLowerCase().includes(search);
    const matchStatus = !filter || f.status === filter;
    return matchSearch && matchStatus;
  });

  if (filtered.length === 0) {
    document.getElementById("tableBody").innerHTML = `
      <div class="state">
        <div class="icon">📭</div>
        <h3>No Forms Found</h3>
        <p>No PA forms match your search or filter.</p>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="window.location.href='pa_form.html'">➕ Create New PA</button>
      </div>`;
    return;
  }

  // Paginate
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const start      = (currentPage - 1) * PER_PAGE;
  const paged      = filtered.slice(start, start + PER_PAGE);

  let html = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Medication / Procedure</th>
          <th>Diagnosis</th>
          <th>Status</th>
          <th>Submitted</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>`;

  paged.forEach((f, i) => {
    const num    = start + i + 1;
    const status = (f.status || "DRAFT").toUpperCase();
    const date   = f.created_at ? new Date(f.created_at).toLocaleDateString() : "—";
    const id     = f._id;

    const viewBtn = `<button class="btn btn-primary btn-sm" onclick="viewStatus('${id}')">👁 View</button>`;
    const pdfBtn  = status === "APPROVED"
      ? `<button class="btn btn-green btn-sm" onclick="viewPDF('${id}')">📄 PDF</button>`
      : "";

    html += `
      <tr>
        <td style="color:#94A3B8;font-size:12px;">${num}</td>
        <td><strong>${f.medication || f.procedure || "—"}</strong></td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
            title="${f.diagnosis || ""}">${f.diagnosis || "—"}</td>
        <td><span class="badge badge-${status}">${status}</span></td>
        <td style="font-size:13px;color:#64748B;">${date}</td>
        <td>
          <div class="action-btns">
            ${viewBtn}
            ${pdfBtn}
          </div>
        </td>
      </tr>`;
  });

  html += `</tbody></table>`;

  // Pagination controls
  if (totalPages > 1) {
    html += `<div class="pagination">`;
    html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>‹ Prev</button>`;
    for (let p = 1; p <= totalPages; p++) {
      html += `<button class="page-btn ${p === currentPage ? "active" : ""}" onclick="changePage(${p})">${p}</button>`;
    }
    html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next ›</button>`;
    html += `</div>`;
  }

  document.getElementById("tableBody").innerHTML = html;
}

function changePage(p) {
  currentPage = p;
  renderTable();
}

// ── Navigation ──────────────────────────────────────────────────
function viewStatus(id) {
  window.location.href = `pa_status.html?id=${id}`;
}

function viewPDF(id) {
  window.location.href = `pdf_viewer.html?id=${id}`;
}

function logout() {
  localStorage.clear();
  window.location.href = "auth.html";
}

// ── Init ────────────────────────────────────────────────────────
loadForms();
</script>
</body>
</html>
