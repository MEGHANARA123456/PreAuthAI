<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Admin Dashboard</title>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:Segoe UI, Roboto, sans-serif;
    background:#f4f7fb;
}

/* ===== LAYOUT ===== */
.container{
    display:flex;
    height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:240px;
    background:#0b3d91;
    color:white;
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:6px;
    margin-bottom:5px;
}

.sidebar a:hover{
    background:#1456c3;
}

/* ===== MAIN ===== */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* ===== TOPBAR ===== */
.topbar{
    background:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

/* ===== CONTENT ===== */
.content{
    padding:25px;
    overflow:auto;
}

/* ===== CARDS ===== */
.cards{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.card{
    flex:1;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card h3{
    margin:0;
    color:#666;
}

.card span{
    font-size:28px;
    font-weight:bold;
    color:#0b3d91;
}

/* ===== TABLE ===== */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#0b3d91;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}

/* ===== BUTTON ===== */
button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-danger{
    background:#dc3545;
    color:white;
}

.btn-success{
    background:#28a745;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

<h2>🏥 Hospital Admin</h2>

<a href="#">Dashboard</a>
<a href="#">Users</a>
<a href="#">Sessions</a>
<a href="#">PA Requests</a>
<a href="#">Reports</a>
<a href="#" onclick="logout()">Logout</a>

</div>


<!-- ===== MAIN ===== -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">

<div>
Welcome, <b id="username">Admin</b>
</div>

<div>
Role: <b id="roleText">ADMIN</b>
</div>

</div>


<!-- CONTENT -->
<div class="content">

<!-- ANALYTICS -->
<div class="cards">

<div class="card">
<h3>Total Users</h3>
<span id="statUsers">0</span>
</div>

<div class="card">
<h3>Active Sessions</h3>
<span id="statSessions">0</span>
</div>

<div class="card">
<h3>PA Requests</h3>
<span id="statPA">0</span>
</div>

<div class="card">
<h3>Approved</h3>
<span id="statApproved">0</span>
</div>

</div>


<!-- USERS TABLE -->
<h3>👥 Users</h3>

<table>

<thead>
<tr>
<th>Email</th>
<th>Username</th>
<th>Role</th>
<th>Created</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>


<br><br>


<!-- SESSION TABLE -->
<h3>🟢 Live Sessions</h3>

<button class="btn-success" onclick="loadSessions()">
Refresh
</button>

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Login Time</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="sessionTable"></tbody>

</table>


</div>
</div>
</div>

</body>
</html>
